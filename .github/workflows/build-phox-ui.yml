name: Build and push phox-ui to Harbor

# 旧: GCP Artifact Registry (asia-northeast1-docker.pkg.dev/phoxtrot/phox)
# 新: 0UTL1ER 自前 Harbor (harbor.0utl1er.tech/phox/...) — GCP 移行に伴う書換。
#
# 認証情報 (HARBOR_USERNAME / HARBOR_PASSWORD) は Forgejo Actions repo secret。
# 中身は project-scoped robot `robot$phox+forgejo-ci` (push+pull only)、
# phox-customer と同じ robot を再登録している (phox/* 配下を共有するため)。
#
# NEXT_PUBLIC_* は browser bundle に焼き込まれる public な値で secret では
# 無いので、変更頻度が低いものは workflow に直書きしている (= ENV を変えるなら
# この yaml の PR を切る、という運用で十分)。Keycloak 側の client_id を
# `phox-ui` から変える時はここも合わせて更新。

on:
  push:
    branches: [main]
  # 緊急時の手動 rebuild 用。
  workflow_dispatch: {}

env:
  REGISTRY: harbor.0utl1er.tech
  IMAGE: phox/phox-ui

# main 連続 push を 1 ジョブに絞る (古い build を残しても意味がない)。
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # NEXT_PUBLIC_* は build-arg として Dockerfile (builder stage) に渡る。
      # browser bundle に焼き込まれるので runtime env では変更できない。
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=https://phox-api.0utl1er.tech
            NEXT_PUBLIC_KEYCLOAK_URL=https://auth.0utl1er.tech
            NEXT_PUBLIC_KEYCLOAK_REALM=company
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=phox-ui
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}/cache:buildx
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}/cache:buildx,mode=max
